app-dbaas-cred:
  type: "external"
  secretStore: "azure-store"
  create: false
  properties:
    - name: "username"
    - name: "password"
app-maas-cred:
  type: "external"
  secretStore: "azure-store"
  create: true
  properties:
    - name: "username"
    - name: "password"
app-sidecar-token:
  type: "external"
  secretStore: "vault-store"
  remoteRefPath: "{{ current_env.cloud }}/{{ current_env.name }}/envgene"
