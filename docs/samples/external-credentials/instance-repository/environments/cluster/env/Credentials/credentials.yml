---
# Environment Credentials File: external Credentials from Credential Template merge + local Credential (creds.get) materialized here with plaintext data.secret.
app-db-cred:
  type: external
  create: true
  secretStore: default-store
  remoteRefPath: cluster/env/db
  properties:
    - name: username
    - name: password
app-sidecar-token:
  type: external
  create: true
  secretStore: default-store
  remoteRefPath: cluster/env/sidecar
app-local-internal:
  type: secret
  data:
    secret: secret-123
