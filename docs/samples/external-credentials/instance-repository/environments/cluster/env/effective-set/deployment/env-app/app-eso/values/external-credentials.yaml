---
# Effective Set v2.0: external sensitive (credRef) when SECRET_MACRO_HANDLER is eso.
# Path: deployment/<namespace-folder>/<application-name>/values/external-credentials.yaml
DB_ADMIN_USER:
  secretStoreId: default-store
  normalizedSecretName: cluster/env/db/app-db-cred
  secretKeys:
    - remoteKeyName: username
DB_ADMIN_PASSWORD:
  secretStoreId: default-store
  normalizedSecretName: cluster/env/db/app-db-cred
  secretKeys:
    - remoteKeyName: password
INTEGRATION_TOKEN:
  secretStoreId: default-store
  normalizedSecretName: cluster/env/sidecar/app-sidecar-token
global: &id001
  DB_ADMIN_USER:
    secretStoreId: default-store
    normalizedSecretName: cluster/env/db/app-db-cred
    secretKeys:
      - remoteKeyName: username
  DB_ADMIN_PASSWORD:
    secretStoreId: default-store
    normalizedSecretName: cluster/env/db/app-db-cred
    secretKeys:
      - remoteKeyName: password
  INTEGRATION_TOKEN:
    secretStoreId: default-store
    normalizedSecretName: cluster/env/sidecar/app-sidecar-token
app-service: *id001