---
# External Credential Context: create: true + secretStores copy (vault normalization: remoteRefPath/credId).
secretStores:
  default-store:
    type: vault
    url: https://vault.example.com
    mountPath: secret
credentials:
  app-db-cred:
    secretStoreId: default-store
    normalizedSecretName: cluster/env/db/app-db-cred
    properties:
      - name: username
      - name: password
  app-sidecar-token:
    secretStoreId: default-store
    normalizedSecretName: cluster/env/sidecar/app-sidecar-token
