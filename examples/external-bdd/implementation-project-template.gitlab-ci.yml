stages:
  - test

variables:
  # Set the URLs of your repositories (these can also be set in CI/CD settings)
  ENV_TEMPLATES_REPO: "https://gitlab.example.com/my-group/env-templates.git"
  ENV_INSTANCES_REPO: "https://gitlab.example.com/my-group/env-instances.git"
  
  # Tokens or keys for cloning private repositories (set these as Protected CI/CD variables)
  # GIT_AUTH_USER: "gitlab-ci-token"
  # GIT_AUTH_PASSWORD: "$CI_JOB_TOKEN" # Or your Personal Access Token
  
  # Directory where repositories will be cloned and where the framework will look for them
  BDD_DATA_DIR: "$CI_PROJECT_DIR/test_data"

# ======================================================================
# Base template (hidden job) for data preparation
# ======================================================================
.prepare_data: &prepare_data
  before_script:
    - echo "Preparing test data directories..."
    - mkdir -p $BDD_DATA_DIR/templates $BDD_DATA_DIR/instances
    
    # If repositories are private, use authentication (uncomment and provide credentials)
    # - git clone https://${GIT_AUTH_USER}:${GIT_AUTH_PASSWORD}@gitlab.example.com/my-group/env-templates.git $BDD_DATA_DIR/templates
    # - git clone https://${GIT_AUTH_USER}:${GIT_AUTH_PASSWORD}@gitlab.example.com/my-group/env-instances.git $BDD_DATA_DIR/instances
    
    # Cloning public repositories (by default)
    - git clone $ENV_TEMPLATES_REPO $BDD_DATA_DIR/templates
    - git clone $ENV_INSTANCES_REPO $BDD_DATA_DIR/instances

# ======================================================================
# Example 1: Run all tests in the project
# ======================================================================
run_all_tests:
  stage: test
  image: ghcr.io/netcracker/qubership-envgene:latest
  <<: *prepare_data
  script:
    # Standard pytest run for the 'tests' folder where your step_defs and features reside
    - export PYTHONPATH=$CI_PROJECT_DIR
    - pytest tests/ -v -s --junitxml=reports/all_tests.xml

# ======================================================================
# Example 2: Run specific test cases (single or multiple)
# ======================================================================
run_specific_tests:
  stage: test
  image: ghcr.io/netcracker/qubership-envgene:latest
  <<: *prepare_data
  script:
    - export PYTHONPATH=$CI_PROJECT_DIR
    
    # Option A: Run a single specific python test file
    - pytest tests/step_defs/test_project.py -v -s
    
    # Option B: Run a specific scenario by matching its name using -k flag
    # - pytest tests/ -k "UC-PROJ-001" -v -s
    
    # Option C: Run multiple specific scenarios using an "or" condition with -k flag
    # - pytest tests/ -k "UC-PROJ-001 or UC-PROJ-002" -v -s
    
    # Option D: Run a specific scenario by its Gherkin tag (if marked with @critical)
    # - pytest tests/ -m "critical" -v -s

# ======================================================================
# Example 3: Run custom tests with HTML report generation
# ======================================================================
run_custom_tests_with_report:
  stage: test
  image: ghcr.io/netcracker/qubership-envgene:latest
  <<: *prepare_data
  script:
    - export PYTHONPATH=$CI_PROJECT_DIR
    # Install additional dependencies for reports if needed
    - pip install pytest-html
    # Run tests located in a specific folder and generate a self-contained HTML report
    - pytest tests/custom_checks/ --html=reports/custom_report.html --self-contained-html
  artifacts:
    when: always
    paths:
      - reports/

# ======================================================================
# Example 4: Run an array (matrix) of tests for different clusters/environments
# ======================================================================
run_matrix_tests:
  stage: test
  image: ghcr.io/netcracker/qubership-envgene:latest
  parallel:
    matrix:
      - CLUSTER_NAME: "dev-cluster"
        ENV_NAME: "backend-env"
      - CLUSTER_NAME: "prod-cluster"
        ENV_NAME: "frontend-env"
  before_script:
    - echo "Preparing data specifically for $CLUSTER_NAME / $ENV_NAME"
    # Create an isolated directory for this specific matrix job
    - export BDD_DATA_DIR="$CI_PROJECT_DIR/test_data/${CLUSTER_NAME}/${ENV_NAME}"
    - mkdir -p $BDD_DATA_DIR/templates $BDD_DATA_DIR/instances
    
    # Cloning private repositories (uncomment if needed)
    # - git clone https://${GIT_AUTH_USER}:${GIT_AUTH_PASSWORD}@gitlab.example.com/my-group/env-templates.git $BDD_DATA_DIR/templates
    # - git clone https://${GIT_AUTH_USER}:${GIT_AUTH_PASSWORD}@gitlab.example.com/my-group/env-instances.git $BDD_DATA_DIR/instances
    
    # Cloning public repositories (by default)
    - git clone $ENV_TEMPLATES_REPO $BDD_DATA_DIR/templates
    - git clone $ENV_INSTANCES_REPO $BDD_DATA_DIR/instances
  script:
    - export PYTHONPATH=$CI_PROJECT_DIR
    # Pass cluster and environment parameters into tests via environment variables.
    # In features, you can use: And the pipeline parameter "ENV_NAMES" is set to "$CLUSTER_NAME/$ENV_NAME"
    # This requires a custom python step to read os.environ (if needed)
    - pytest tests/ -v -s --junitxml=reports/matrix_${CLUSTER_NAME}_${ENV_NAME}.xml
