stages:
  - test

variables:
  # Настройте URL ваших репозиториев (можно также задать их в настройках CI/CD проекта)
  ENV_TEMPLATES_REPO: "https://gitlab.example.com/my-group/env-templates.git"
  ENV_INSTANCES_REPO: "https://gitlab.example.com/my-group/env-instances.git"
  
  # Токены или ключи для клонирования приватных репозиториев (задайте их как Protected CI/CD variables)
  # GIT_AUTH_USER: "gitlab-ci-token"
  # GIT_AUTH_PASSWORD: "$CI_JOB_TOKEN" # Или ваш Personal Access Token
  
  # Директория, в которую будут клонироваться репозитории и где фреймворк будет их искать
  BDD_DATA_DIR: "$CI_PROJECT_DIR/test_data"

bdd_integration_tests:
  stage: test
  image: ghcr.io/netcracker/qubership-envgene:latest
  before_script:
    - echo "Preparing test data directories..."
    - mkdir -p $BDD_DATA_DIR/templates
    - mkdir -p $BDD_DATA_DIR/instances
    
    # Если репозитории приватные, используйте аутентификацию (раскомментируйте и подставьте нужный способ)
    # - git clone https://${GIT_AUTH_USER}:${GIT_AUTH_PASSWORD}@gitlab.example.com/my-group/env-templates.git $BDD_DATA_DIR/templates
    # - git clone https://${GIT_AUTH_USER}:${GIT_AUTH_PASSWORD}@gitlab.example.com/my-group/env-instances.git $BDD_DATA_DIR/instances
    
    # Клонирование публичных репозиториев (по умолчанию)
    - git clone $ENV_TEMPLATES_REPO $BDD_DATA_DIR/templates
    - git clone $ENV_INSTANCES_REPO $BDD_DATA_DIR/instances
    
    - echo "Test data is ready!"
    - ls -la $BDD_DATA_DIR
    
  script:
    # Запуск E2E тестов. bdd_runner.py (или ваш кастомный скрипт) использует $BDD_DATA_DIR
    - python /module/scripts/bdd_runner.py
