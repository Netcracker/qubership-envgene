name: "E2E BDD Tests"

on:
  push:
    branches:
      - '**'

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build and Start Cucumber Environment
        run: |
          docker build -t local-envgene-main -f build_envgene/build/Dockerfile .
          docker compose -f devtools/docker-compose.yml up -d --build cucumber

      - name: Prepare Test Environment
        run: |
          docker compose -f devtools/docker-compose.yml exec -T cucumber bash -c "chmod +x /workspace/devtools/cucumber/up.sh && /workspace/devtools/cucumber/up.sh"

      - name: Test Artifact Downloading
        run: |
          docker compose -f devtools/docker-compose.yml exec -T cucumber bash -c "export PYTHONPATH=/workspace && cd /workspace && pytest tests/step_defs/test_artifact_downloading.py -v -s | tee -a /workspace/e2e_tests.log"

      - name: Test Auto Environment Name
        run: |
          docker compose -f devtools/docker-compose.yml exec -T cucumber bash -c "export PYTHONPATH=/workspace && cd /workspace && pytest tests/step_defs/test_auto_environment_name.py -v -s | tee -a /workspace/e2e_tests.log"

      - name: Test Blue Green Deployment
        run: |
          docker compose -f devtools/docker-compose.yml exec -T cucumber bash -c "export PYTHONPATH=/workspace && cd /workspace && pytest tests/step_defs/test_blue_green_deployment.py -v -s | tee -a /workspace/e2e_tests.log"

      - name: Test Calculator CLI
        run: |
          docker compose -f devtools/docker-compose.yml exec -T cucumber bash -c "export PYTHONPATH=/workspace && cd /workspace && pytest tests/step_defs/test_calculator_cli.py -v -s | tee -a /workspace/e2e_tests.log"

      - name: Test Credential Rotation
        run: |
          docker compose -f devtools/docker-compose.yml exec -T cucumber bash -c "export PYTHONPATH=/workspace && cd /workspace && pytest tests/step_defs/test_credential_rotation.py -v -s | tee -a /workspace/e2e_tests.log"

      - name: Test EnvGene Null Value Validation
        run: |
          docker compose -f devtools/docker-compose.yml exec -T cucumber bash -c "export PYTHONPATH=/workspace && cd /workspace && pytest tests/step_defs/test_envgene_null_value_validation.py -v -s | tee -a /workspace/e2e_tests.log"

      - name: Test Environment Instance Generation
        run: |
          docker compose -f devtools/docker-compose.yml exec -T cucumber bash -c "export PYTHONPATH=/workspace && cd /workspace && pytest tests/step_defs/test_environment_instance_generation.py -v -s | tee -a /workspace/e2e_tests.log"

      - name: Test SBOM Retention
        run: |
          docker compose -f devtools/docker-compose.yml exec -T cucumber bash -c "export PYTHONPATH=/workspace && cd /workspace && pytest tests/step_defs/test_sbom_retention.py -v -s | tee -a /workspace/e2e_tests.log"

      - name: Test SD Processing
        run: |
          docker compose -f devtools/docker-compose.yml exec -T cucumber bash -c "export PYTHONPATH=/workspace && cd /workspace && pytest tests/step_defs/test_sd_processing.py -v -s | tee -a /workspace/e2e_tests.log"

      - name: Test Background Manage (Standalone)
        run: |
          docker compose -f devtools/docker-compose.yml exec -T cucumber bash -c "export PYTHONPATH=/workspace && cd /workspace && pytest tests/step_defs/test_bg_manage.py -v -s | tee -a /workspace/e2e_tests.log"

      - name: Test Environment Inventory Generation (Standalone)
        run: |
          docker compose -f devtools/docker-compose.yml exec -T cucumber bash -c "export PYTHONPATH=/workspace && cd /workspace && pytest tests/step_defs/test_environment_inventory_generation.py -v -s | tee -a /workspace/e2e_tests.log"

      - name: Upload Test Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-logs
          path: e2e_tests.log

      - name: Tear Down Environment
        if: always()
        run: |
          docker compose -f devtools/docker-compose.yml down
